aid: subaru-of-america
name: Subaru of America
description: >-
  Subaru of America, Inc. is the United States subsidiary of Subaru Corporation
  (Japan), headquartered in Camden, New Jersey. SOA sells, services, and supports
  the Subaru lineup through more than 600 U.S. dealers and operates the MySubaru
  / STARLINK connected-vehicle platform that powers the MySubaru mobile app,
  owner portal, remote vehicle commands, safety and security services, in-vehicle
  Wi-Fi, and dealer integration. None of these surfaces are exposed as a public
  developer API; all known interfaces are private, OEM-internal, or partner-only.
url: >-
  https://raw.githubusercontent.com/api-evangelist/subaru-of-america/refs/heads/main/apis.yml
type: Index
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
  - Automobiles
  - Automotive
  - Cars
  - Vehicles
  - Connected Vehicle
  - Telematics
  - OEM
created: '2026-05-23'
modified: '2026-05-23'
specificationVersion: '0.19'
apis:
  - aid: subaru-of-america:mysubaru-connected-services-api
    name: MySubaru Connected Services API
    description: >-
      Private connected-vehicle backend (formerly branded Subaru STARLINK) that
      powers the MySubaru mobile app and owner portal. Supports remote lock /
      unlock, remote engine start with climate control, vehicle locate, horn and
      lights, door / window / sunroof status, tire pressure, fuel economy,
      odometer, PHEV charging, SOS emergency assistance, enhanced roadside
      assistance, and vehicle service reminders. No public developer portal,
      no published OpenAPI, no documented authentication scheme. Surface is
      reverse-engineered by community projects (e.g., G-two/subarulink) and
      may change without notice.
    humanURL: https://www.subaru.com/owners/starlink.html
    baseURL: ''
    tags:
      - Connected Vehicle
      - Telematics
      - Remote Commands
      - Safety
      - Security
      - Mobile App Backend
    properties:
      - type: Marketing
        url: https://www.subaru.com/owners/starlink.html
      - type: Owner Portal
        url: https://www.mysubaru.com/
      - type: Mobile App iOS
        url: https://apps.apple.com/us/app/mysubaru/id1454853263
      - type: Mobile App Android
        url: https://play.google.com/store/apps/details?id=com.subaru.telematics.app.remote
      - type: Third Party Client
        url: https://github.com/G-two/subarulink
      - type: Third Party Research
        url: https://github.com/sgayou/subaru-starlink-research
  - aid: subaru-of-america:mysubaru-companion-plan-api
    name: MySubaru Companion Plan API
    description: >-
      Plan tier surface (2026+ model years) covering SOS Emergency Assistance,
      Enhanced Roadside Assistance, Locate Vehicle, plus the premium remote
      engine start and climate control add-ons. Subscription, plan eligibility,
      and entitlements are managed inside the MySubaru account; no documented
      public API for plan administration.
    humanURL: https://www.subaru.com/owners/starlink.html
    tags:
      - Subscriptions
      - Entitlements
      - Safety
      - Connected Vehicle
    properties:
      - type: Marketing
        url: https://www.subaru.com/owners/starlink.html
  - aid: subaru-of-america:mysubaru-safety-security-plan-api
    name: MySubaru Safety & Security Plan API
    description: >-
      Plan tier surface (2016-2025 model years) covering safety and security
      protection services with an upper tier adding Remote Engine Start and
      Remote Vehicle Locate. Same private backend as MySubaru Connected Services;
      not exposed publicly.
    humanURL: https://www.subaru.com/owners/starlink.html
    tags:
      - Subscriptions
      - Entitlements
      - Safety
      - Security
      - Connected Vehicle
    properties:
      - type: Marketing
        url: https://www.subaru.com/owners/starlink.html
  - aid: subaru-of-america:subaru-att-wifi-hotspot-api
    name: Subaru AT&T Wi-Fi Hotspot API
    description: >-
      In-vehicle 4G LTE Wi-Fi hotspot service delivered through a partnership
      with AT&T. Activation, plan management, and data billing are handled by
      AT&T's connected-car backend, not by Subaru. No Subaru-side public API.
    humanURL: https://www.subaru.com/owners/connected-services.html
    tags:
      - In Car Wi-Fi
      - Connectivity
      - Partner Service
    properties:
      - type: Marketing
        url: https://www.subaru.com/owners/connected-services.html
      - type: Partner
        url: https://www.att.com/internet/connected-car/
  - aid: subaru-of-america:subaru-siriusxm-api
    name: Subaru SiriusXM API
    description: >-
      In-vehicle satellite and streaming audio service delivered through
      SiriusXM. Trial activation, subscription, and entitlements are managed
      by SiriusXM. Subaru does not expose a developer API for this surface.
    humanURL: https://www.subaru.com/owners/connected-services.html
    tags:
      - Audio
      - Streaming
      - Partner Service
    properties:
      - type: Marketing
        url: https://www.subaru.com/owners/connected-services.html
      - type: Partner
        url: https://www.siriusxm.com/
  - aid: subaru-of-america:subaru-dealer-locator-api
    name: Subaru Dealer Locator API
    description: >-
      Web-facing dealer locator and inventory search powering subaru.com.
      Backed by an internal HTTP service; not documented or offered as a
      public developer API.
    humanURL: https://www.subaru.com/find-a-retailer.html
    tags:
      - Dealer Locator
      - Inventory
      - Retail
    properties:
      - type: Marketing
        url: https://www.subaru.com/find-a-retailer.html
  - aid: subaru-of-america:subaru-recall-lookup-api
    name: Subaru Recall Lookup API
    description: >-
      VIN-based recall lookup exposed through subaru.com. Backed by an internal
      service that aggregates Subaru and NHTSA recall data; not offered as a
      public API. NHTSA itself provides a public VIN recall API that mirrors
      most of this data.
    humanURL: https://www.subaru.com/owners/vehicle-recalls.html
    tags:
      - Recalls
      - VIN Lookup
      - Safety
    properties:
      - type: Marketing
        url: https://www.subaru.com/owners/vehicle-recalls.html
      - type: Upstream Public Source
        url: https://api.nhtsa.gov/
